<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/devbox.svg" />

    <!-- Apply the saved theme before paint to avoid a flash of the wrong theme.
         Only touches the <html> class (not React-managed DOM), so it does not
         affect hydration. -->
    <script>
      try {
        if (localStorage.getItem("theme") === "dark") {
          document.documentElement.classList.add("dark");
        }
      } catch (e) {}
    </script>

    <!-- Preconnect for critical external origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://unpkg.com" crossorigin />
    <link rel="preconnect" href="https://pagead2.googlesyndication.com" crossorigin />

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="DevBox" />

    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9814892451020152"
     crossorigin="anonymous"></script>

    <!-- Adsense Meta Tags -->
    <meta name="google-adsense-account" content="ca-pub-9814892451020152">

    <!-- Google Site Verification -->
    <meta name="google-site-verification" content="mH9hjY7U2Crf9S-48_CVNkuhN0ccTwh5HeedoiP5tlE" />

    <!--
      Per-page title, description, canonical, Open Graph, Twitter and JSON-LD
      tags are rendered for each route via react-helmet-async (see PageMeta.tsx)
      and baked into the prerendered HTML at build time by vite-react-ssg. They
      are intentionally kept out of this template to avoid duplicate head tags.
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
